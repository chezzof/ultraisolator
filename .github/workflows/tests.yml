name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  desktop-ui:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install UI dependencies
        run: npm ci --ignore-scripts --prefix ui

      - name: Build renderer
        run: npm --prefix ui run build:renderer

      - name: Generate deterministic assets
        run: npm --prefix ui run build:assets

      - name: Verify deterministic assets are committed
        run: git diff --exit-code -- ui/assets

      - name: Run UI smoke test
        run: npm --prefix ui run smoke

      - name: Run release readiness gate without packaging
        run: powershell -File scripts/release-check.ps1 -SkipPackage
